name: Deploy to Contabo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: contabo-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
        run: |
          set -euo pipefail

          npm run build

      - name: Package validated release
        run: |
          set -euo pipefail

          release_archive="$RUNNER_TEMP/orinks-net-release.tar.gz"
          tar \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude=".next/cache" \
            --exclude=".env.local" \
            --exclude=".env.production" \
            --exclude="dev-server*.log" \
            --exclude="dev-server*.err" \
            -czf "$release_archive" .
          printf 'release_archive=%s\n' "$release_archive" >> "$GITHUB_ENV"

      - name: Upload validated release
        uses: actions/upload-artifact@v7
        with:
          name: orinks-net-release
          path: ${{ env.release_archive }}
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: [self-hosted, Linux, X64, orinks-net-prod]
    needs: validate
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Download validated release
        uses: actions/download-artifact@v7
        with:
          name: orinks-net-release

      - name: Deploy local release
        run: |
          set -euo pipefail

          app_name="orinks-net"
          base="$HOME/apps/$app_name"
          releases="$base/releases"
          shared="$base/shared"
          current="$base/current"
          service="orinks-net.service"
          keep_releases=5

          mkdir -p "$releases" "$shared"

          short_commit="${GITHUB_SHA:0:7}"
          release="$(date -u +%Y%m%d%H%M%S)-$short_commit"
          release_path="$releases/$release"

          if [ -e "$release_path" ]; then
            echo "Release already exists: $release_path"
            exit 1
          fi

          mkdir -p "$release_path"
          tar -xzf "$GITHUB_WORKSPACE/orinks-net-release.tar.gz" -C "$release_path"

          cd "$release_path"
          if [ -f "$shared/.env.production" ]; then
            ln -sfn "$shared/.env.production" .env.production
          fi
          npm ci --omit=dev

          ln -sfn "$release_path" "$current"
          printf '%s\n' "$release_path" > "$base/latest-release-path"
          sudo systemctl restart "$service"
          systemctl is-active "$service"

          health_url="${ORINKS_NET_HEALTH_URL:-https://orinks.net/api/health}"
          for attempt in {1..12}; do
            if curl --fail --silent --show-error --max-time 10 "$health_url" > /tmp/orinks-net-health.json; then
              echo "Health check passed: $health_url"
              cat /tmp/orinks-net-health.json
              break
            fi

            if [ "$attempt" -eq 12 ]; then
              echo "Health check failed after $attempt attempts: $health_url"
              sudo systemctl status "$service" --no-pager || true
              exit 1
            fi

            sleep 5
          done

          mapfile -t old_releases < <(
            find "$releases" -mindepth 1 -maxdepth 1 -type d | sort -r | tail -n +"$((keep_releases + 1))"
          )

          if [ "${#old_releases[@]}" -gt 0 ]; then
            rm -rf "${old_releases[@]}"
          fi

          echo "Deployed $app_name $short_commit to $release_path"
