<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Play Space Colony Defense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" type="text/css" href="./styles.min.css" />
  </head>
  <body role="application">
    <main class="a-app">
      <canvas class="a-app--overlaySupport"></canvas>

      <div class="a-app--screen a-app--game">
        <section class="c-screen a-game" tabindex="-1" aria-label="Game"></section>
      </div>

      <div class="a-app--screen a-app--mainMenu">
        <section class="c-screen c-menu a-mainMenu" tabindex="-1" aria-label="Main menu">
          <p class="c-menu--eyebrow">Audio colony defense</p>
          <h1 class="c-menu--title">Space Colony Defense</h1>
          <div class="c-menu--summary" aria-live="polite"></div>
          <div class="c-menu--items" role="menu"></div>
        </section>
      </div>

      <div class="a-app--screen a-app--options">
        <section class="c-screen c-menu a-options" tabindex="-1" aria-label="Options">
          <p class="c-menu--eyebrow">Configuration</p>
          <h1 class="c-menu--title">Options</h1>
          <div class="c-menu--summary" aria-live="polite"></div>
          <div class="c-menu--items" role="menu"></div>
        </section>
      </div>

      <div class="a-app--screen a-app--splash">
        <section class="c-screen a-splash" tabindex="-1">
          <h1 class="a-splash--logo">Space Colony Defense</h1>
          <div class="a-splash--details">
            <div class="a-splash--version"></div>
            <div class="a-splash--author">by Orinks</div>
          </div>
          <button class="a-splash--instruction" type="button">Interact to Begin</button>
        </section>
      </div>

    </main>
    <script src="./scripts.min.js"></script>
  </body>
</html>
